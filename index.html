<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angelique & Damion's Wedding!!</title>
    <style>
        body {
        margin: 0;
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        background-color: #000000;
    	color: #ffffff;
    	overflow-x: hidden;
        }
        
        #image-container {
            width: 100%;
            max-width: 1200px;
        }
        
        #image-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        #countdown-section {
            text-align: center;
            padding: 20px;
            font-size: 1.5rem;
            color: #ffffff;
        }
        
        #timer {
            font-weight: bold;
            color: #FF0000;
            font-size: 2rem;
            margin-top: 10px;
        }
        
        .heart-animation {
    	    font-size: 5rem;
    	    display: block;
    	    margin-top: 30px;
    	    animation: pulse 1s infinite;
		}

		@keyframes pulse {
    		0% { transform: scale(1); }
    		50% { transform: scale(1.4); }
    		100% { transform: scale(1); }
    	}
    	
    	.divider {
    		width: 50%;
    		height: 2px;
    		background: linear-gradient(to right, transparent, #d4a373, transparent);
    		margin: 30px auto;
    		animation: fadeIn 3s ease-in-out;
		}

		@keyframes fadeIn {
    		from { opacity: 0; }
    		to { opacity: 1; }
		}
}

/* The fading line decoration */
.divider {
    width: 50%;
    height: 2px;
    background: linear-gradient(to right, transparent, #d4a373, transparent);
    margin: 30px auto;
    animation: fadeIn 3s ease-in-out;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}
    </style>
</head>

	<body>

    <div id="image-container">
        <img src="banner.png" alt="Wedding Banner">
    </div>

    <div id="countdown-section">
        <div>Time remaining until the wedding:</div>
        <div id="timer">Loading...</div>
        
        <div class="divider"></div>
    <div class="heart-animation">❤️</div>
    </div>

    <script>
        const targetDate = new Date("Jun 7, 2026 12:00:00").getTime();

        const timerInterval = setInterval(function() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("timer").innerHTML = days + "d " + hours + "h " + minutes + "m " + seconds + "s ";

            if (distance < 0) {
                clearInterval(timerInterval);
                document.getElementById("timer").innerHTML = "EXPIRED";
            }
        }, 1000);
    </script>
	</body>
</html>
