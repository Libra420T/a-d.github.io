<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angelique & Damion's Wedding!!</title>
    <style>
        body {
        margin: 0;
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        background-color: #000000;
    	color: #ffffff;
        }
        
        #image-container {
            width: 100%;
            max-width: 1200px;
        }
        
        #image-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        #countdown-section {
            text-align: center;
            padding: 20px;
            font-size: 1.5rem;
            color: #333;
        }
        
        #timer { font-weight: bold; color: #d4a373; font-size: 2rem; }
    </style>
</head>
<body>

    <div id="image-container">
        <img src="banner.png" alt="Wedding Banner">
    </div>

    <div id="countdown-section">
        <div>Time remaining until the wedding:</div>
        <div id="timer">Loading...</div>
    </div>

    <script>
        const targetDate = new Date("Jun 7, 2026 12:00:00").getTime();

        const timerInterval = setInterval(function() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("timer").innerHTML = days + "d " + hours + "h " + minutes + "m " + seconds + "s ";

            if (distance < 0) {
                clearInterval(timerInterval);
                document.getElementById("timer").innerHTML = "EXPIRED";
            }
        }, 1000);
    </script>
</body>
</html>
